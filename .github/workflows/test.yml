name: Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: ${{ matrix.build }}/${{ matrix.os }}/${{ matrix.mode }}/${{ matrix.defaultnative }}/${{ matrix.auto }}

    defaults:
      run:
        shell: bash -l {0}

    strategy:
      fail-fast: false
      matrix:
        build: [clasp, cando]
        os: [macos-latest, ubuntu-latest]
        mode: [native, bytecode]
        defaultnative: [no, yes]
        auto: [no, yes]
        exclude:
          - mode: native
            auto: yes
          - mode: native
            defaultnative: no
          - mode: bytecode
            defaultnative: yes
          - build: cando
            mode: native
          - build: cando
            auto: yes
          - os: macos-latest
            mode: native

    runs-on: ${{ matrix.os }}

    steps:
    - name: Install Ubuntu dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt install -y binutils-gold clang-18 libclang-18-dev libclang-cpp18-dev llvm-18 llvm-18-dev libelf-dev libgmp-dev libunwind-dev ninja-build sbcl libnetcdf-dev libexpat1-dev libfmt-dev libboost-all-dev
 
    - name: Install MacOS dependencies
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew upgrade
        brew install boost fmt gmp llvm@19 lld ninja pkg-config sbcl netcdf
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: conda-incubator/setup-miniconda@v3.2.0
      if: matrix.build == 'cando'

    - name: Install AmberTools
      if: matrix.build == 'cando'
      run: |
        conda install -c conda-forge ambertools

    - name: Clasp koga @ Ubuntu
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.build == 'clasp' }}
      run: |
        ./koga --build-mode=${{ matrix.mode }} ${{ case(matrix.defaultnative == 'yes', '--default-native', '--no-default-native') }}
    - name: Cando koga @ Ubuntu
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.build == 'cando' }}
      run: |
        ./koga --build-mode=${{ matrix.mode }} ${{ case(matrix.defaultnative == 'yes', '--default-native', '--no-default-native')}} --extensions=cando
    - name: Clasp koga @ MacOS
      if: ${{ matrix.os == 'macos-latest' && matrix.build == 'clasp' }}
      run: |
        ./koga --build-mode=${{ matrix.mode }} ${{ case(matrix.defaultnative == 'yes', '--default-native', '--no-default-native')}} --cflags=-I/opt/homebrew/include --cppflags=-I/opt/homebrew/include --cxxflags=-I/opt/homebrew/include
    - name: Cando koga @ MacOS
      if: ${{ matrix.os == 'macos-latest' && matrix.build == 'cando' }}
      run: |
        ./koga --build-mode=${{ matrix.mode }} ${{ case(matrix.defaultnative == 'yes', '--default-native', '--no-default-native') }} --extensions=cando --cflags=-I/opt/homebrew/include --cppflags=-I/opt/homebrew/include --cxxflags=-I/opt/homebrew/include
    - name: Build
      run: |
        ninja -C build
    - name: Run regression tests
      if: ${{ matrix.auto == 'no' }}
      run: |
        ninja -C build test
    - name: Run regression tests [auto]
      if: ${{ matrix.auto == 'yes' }}
      run: |
        CLASP_AUTOCOMPILATION=1 ninja -C build test
    - name: Run ANSI tests
      if: ${{ matrix.build == 'clasp' && matrix.auto == 'no' }}
      run: |
        ninja -C build ansi-test
    - name: Run ANSI tests [auto]
      if: ${{ matrix.build == 'clasp' && matrix.auto == 'yes' }}
      run: |
        CLASP_AUTOCOMPILATION=1 ninja -C build ansi-test
    - name: Run Cando regression tests
      if: ${{ matrix.build == 'cando' }}
      run: |
        ninja -C build cando-test
